name: Angular Modern Build

on:
  push:
    branches:
      - master
      - main

  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build Angular application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify Angular project
        shell: bash
        run: |
          echo "Directorio actual:"
          pwd

          echo "Contenido del repositorio:"
          ls -la

          test -f angular.json
          test -f package.json
          test -f package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular application
        run: npm run build