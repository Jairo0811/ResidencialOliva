name: Angular Legacy Build

on:
  push:
    branches: [master, upgrade-angular, legacy-angular-12]
  pull_request:
    branches: [master, upgrade-angular, legacy-angular-12]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: 16.20.2

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Fix Angular 12 dependency versions
        run: npm install typescript@4.3.5 tslib@2.3.1 @angular/fire@6.1.5 firebase@8.10.1 rxfire@6.0.0 --save-dev --legacy-peer-deps --ignore-scripts

      - name: Run NGCC
        run: npx ngcc

      - name: Build Angular legacy app
        run: npm run build