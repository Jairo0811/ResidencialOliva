<section class="login-page">
  <div class="login-card">
    <div class="brand">
      <img src="/images/logo-residencial-oliva.png" alt="Logo de Edificios Oliva" />

      <span>PANEL ADMINISTRATIVO</span>

      <h1>Iniciar sesión</h1>

      <p>Accede para administrar apartamentos, reservas, clientes y pagos.</p>
    </div>

    <form (ngSubmit)="login()" autocomplete="on">
      <label for="email"> Correo electrónico </label>

      <input
        id="email"
        type="email"
        name="email"
        [(ngModel)]="email"
        autocomplete="email"
        placeholder="admin@edificiosoliva.com"
        required
        aria-required="true"
      />

      <label for="password"> Contraseña </label>

      <div class="password-field">
        <input
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          name="password"
          [(ngModel)]="password"
          placeholder="Tu contraseña"
          autocomplete="current-password"
          required
          aria-required="true"
        />

        <button
          type="button"
          (click)="togglePassword()"
          [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        >
          <i
            class="bi"
            [class.bi-eye]="!showPassword"
            [class.bi-eye-slash]="showPassword"
            aria-hidden="true"
          >
          </i>
        </button>
      </div>

      @if (errorMessage) {
        <div class="error-message" role="alert" aria-live="assertive">
          {{ errorMessage }}
        </div>
      }

      <button class="login-btn" type="submit" [disabled]="loading" [attr.aria-busy]="loading">
        @if (loading) {
          <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"> </span>

          Iniciando sesión...
        } @else {
          Iniciar sesión
        }
      </button>

      <div class="divider" aria-hidden="true">
        <span>o continuar con</span>
      </div>

      <button
        class="google-btn"
        type="button"
        (click)="loginGoogle()"
        [disabled]="loading"
        aria-label="Iniciar sesión con Google"
      >
        <i class="bi bi-google" aria-hidden="true"> </i>

        Iniciar sesión con Google
      </button>
    </form>

    <a routerLink="/" class="back-home"> ← Volver al sitio web </a>
  </div>
</section>
