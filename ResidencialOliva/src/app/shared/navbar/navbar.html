<nav class="navbar" aria-label="Navegación principal">
  <div class="container-custom">
    <a class="logo" routerLink="/" (click)="closeMenu()" aria-label="Ir al inicio">
      <img src="/images/logo-residencial-oliva.png" alt="Logo de Edificios Oliva" />
    </a>

    <button
      class="hamburger"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      aria-controls="menu-principal"
      aria-label="Abrir o cerrar menú de navegación">
      <i class="bi" [class.bi-list]="!menuOpen" [class.bi-x-lg]="menuOpen" aria-hidden="true"></i>
    </button>

    <div class="nav-content" [class.open]="menuOpen" id="menu-principal">
      <ul class="menu">
        <li><a routerLink="/" (click)="closeMenu()">Inicio</a></li>
        <li><a routerLink="/departamentos" (click)="closeMenu()">Departamentos</a></li>
        <li><a routerLink="/galeria" (click)="closeMenu()">Galería</a></li>
        <li><a routerLink="/nosotros" (click)="closeMenu()">Nosotros</a></li>
        <li><a routerLink="/contacto" (click)="closeMenu()">Contacto</a></li>
      </ul>

      <div class="actions">
        <a routerLink="/login" class="btn-login" (click)="closeMenu()">Iniciar sesión</a>
        <a routerLink="/reservar" class="btn-book" (click)="closeMenu()">Reservar</a>
      </div>
    </div>
  </div>
</nav>
